<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MathJax Smoke Test</title>

        <!-- 1) Polyfill: must come before MathJax config or loader -->
        <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

        <!-- 2) MathJax configuration -->
        <script>
            window.MathJax = {
                tex: {
                    inlineMath: [
                        ["$", "$"],
                        ["\\(", "\\)"],
                    ],
                    displayMath: [
                        ["$$", "$$"],
                        ["\\[", "\\]"],
                    ],
                },
            };
        </script>

        <!-- 3) MathJax loader -->
        <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

        <style>
            body {
                font-family: sans-serif;
                padding: 2rem;
            }
            .math {
                text-align: center;
                margin: 2rem 0;
            }
        </style>
    </head>

    <body>
        <h1>✅ If you see this, HTML is loading</h1>
        <p>This paragraph should always appear. If it doesn’t, there’s a more basic HTML/CSS issue.</p>

        <div class="math">
            <script type="math/tex; mode=display">
                A(n,k) = \sum_{i=0}^{k}(-1)^{i}\binom{n+1}{i}(k+1-i)^{n}
            </script>
        </div>

        <p>If the above formula rendered, MathJax is working.</p>

        <div class="math">
            <script type="math/tex; mode=display">
                P_n = \frac{1}{n!}\sum_{k=\lfloor n/2\rfloor + 1}^{n}\sum_{j=0}^{k+1}(-1)^{j}\binom{n+1}{j}(k+1-j)^{n}
            </script>
        </div>
    </body>
</html>
